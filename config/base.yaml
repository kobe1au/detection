# 2026 main experiment base config.
# Protocol: 2018-2021 historical train / 2022 validation / 2024 final test.
# Continual configs explicitly set 2023 as the recent-year adaptation pool.

data:
  out_dir: "experiments"

  train_pt_dir: "pts/train"
  val_pt_dir: "pts/val"
  test_pt_dir: "/pts/test"

  train_csv: "results/labels/train.csv"
  adapt_pt_dir: null
  adapt_csv: null
  val_csv: "results/labels/val.csv"
  test_csv: "results/labels/test_2024.csv"
  extra_tests: []

  max_api_events_per_sample: 1024

model:
  num_classes: 2
  fusion_mode: concat
  max_nodes_gnn: 12288
  max_xattn_nodes: 1024

  api_encoder:
    type: transformer
    num_hash_buckets: 8192
    type_vocab_size: 16
    max_seq_len: 1024
    layers: 2
    heads: 4

  graph_encoder:
    type: gatv2
    hidden: 128
    heads: 4
    layers: 2
    use_behavior_hint: false
    drop_extracted_behavior_hints: true

  alignment:
    enabled: false
    adaptive_bias: false
    penalty_scale: 0.0
    bonus_scale: 0.0
    context_scale: 0.0

  gate:
    mode: fixed
    quality_inputs: false
    uncertainty_inputs: false
    detach: true

train:
  exp_name: base_concat_erm
  seed: 42
  device: auto
  use_amp: true

  epochs: 60
  batch_size: 32
  eval_batch_size: 32
  grad_accum_steps: 1

  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 1

  lr: 0.0003
  weight_decay: 0.01
  warmup_epochs: 3
  warmup_stage_epochs: 0
  historical_epochs: 60
  adaptation_epochs: 0
  adaptation_ratio: 1.0
  replay_ratio: 0.25
  replay_strategy: static
  eta_min: 0.000001
  label_smoothing: 0.05
  patience: 10
  min_delta: 0.0001

loss:
  semantic_alignment_weight: 0.0
  class_aware_alignment_same_class_weight: 0.0
  class_aware_alignment_temperature: 0.2

  stage1_branch_aux_weight: 0.0
  branch_aux_weight: 0.0
