# 2026 main experiment base config.
# Default protocol: 2018-2021 historical train / 2022 validation /
# 2023 recent adaptation / 2024 final test.
# Override YAMLs should only state experimental deltas.

data:
  out_dir: "experiments"

  train_pt_dir: "pts/train"
  val_pt_dir: "pts/val"
  test_pt_dir: "pts/test"

  train_csv: "results/labels/train.csv"
  adapt_pt_dir: "pts/adapt"
  adapt_csv: "results/labels/adapt_2023.csv"
  val_csv: "results/labels/val.csv"
  test_csv: "results/labels/test_2024.csv"
  extra_tests: []

  max_api_events_per_sample: 1024

model:
  num_classes: 2
  fusion_mode: ours
  max_nodes_gnn: 12288
  max_xattn_nodes: 1024

  api_encoder:
    type: transformer
    num_hash_buckets: 8192
    type_vocab_size: 16
    max_seq_len: 1024
    layers: 2
    heads: 4

  graph_encoder:
    type: gatv2
    hidden: 128
    heads: 4
    layers: 2
    use_behavior_hint: false
    drop_extracted_behavior_hints: true

  alignment:
    enabled: true
    adaptive_bias: true
    penalty_scale: 0.30
    bonus_scale: 0.80
    context_scale: 0.25

  gate:
    mode: learned
    quality_inputs: true
    uncertainty_inputs: true
    time_inputs: true
    time_feature_set: basic
    detach: true

train:
  exp_name: base_full_dbta020
  warm_start_historical_ckpt: ""
  seed: 42
  device: auto
  use_amp: true

  epochs: 80
  batch_size: 32
  eval_batch_size: 32
  grad_accum_steps: 1

  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 1

  lr: 0.0003
  weight_decay: 0.01
  warmup_epochs: 3
  warmup_stage_epochs: 3
  historical_epochs: 60
  adaptation_epochs: 20
  adaptation_ratio: 0.20
  replay_ratio: 0.25
  replay_strategy: drift_matched
  adaptation_selection: dbta
  dbta_balance: predicted_label
  dbta_uncertainty_weight: 1.0
  dbta_disagreement_weight: 1.0
  dbta_prototype_weight: 1.0
  dbta_drift_replay_fraction: 0.5
  eta_min: 0.000001
  label_smoothing: 0.05
  patience: 10
  min_delta: 0.0001

loss:
  semantic_alignment_weight: 0.05
  class_aware_alignment_same_class_weight: 0.20
  class_aware_alignment_temperature: 0.2
  local_alignment_weight: 0.02
  max_local_align_nodes: 128
  max_local_align_tokens: 256
  alignment_use_temporal_soft_weight: false
  alignment_use_temporal_reliability: true
  alignment_use_drift_reliability: true

  stage1_branch_aux_weight: 0.10
  branch_aux_weight: 0.10
