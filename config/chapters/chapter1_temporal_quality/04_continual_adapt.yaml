data:
  out_dir: "experiments/chapter1_temporal_quality"
  adapt_pt_dir: "pts/adapt"
  adapt_csv: "results/labels/adapt_2023.csv"

model:
  fusion_mode: ours
  alignment:
    enabled: true
    adaptive_bias: true
    penalty_scale: 0.15
    bonus_scale: 0.15
    context_scale: 0.25
  gate:
    mode: learned
    quality_inputs: true
    uncertainty_inputs: true
    time_inputs: true

train:
  exp_name: "ch1_continual_adapt"
  epochs: 80
  warmup_stage_epochs: 3
  adaptation_epochs: 20

loss:
  semantic_alignment_weight: 0.10
  class_aware_alignment_same_class_weight: 0.20
  alignment_use_temporal_reliability: true
  alignment_use_drift_reliability: true
  stage1_branch_aux_weight: 0.05
  branch_aux_weight: 0.10
