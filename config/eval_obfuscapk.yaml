# Each CSV must map the obfuscated APK SHA256 (the PT filename stem) to the
# original clean sample label. Do not reuse the clean CSV unchanged because
# obfuscation changes the APK hash.
scenarios:
  rebuild:
    pt_dir: D:/pts_obfuscapk/rebuild
    csv: results/labels_obfuscapk/rebuild.csv
  rename:
    pt_dir: D:/pts_obfuscapk/rename
    csv: results/labels_obfuscapk/rename.csv
  string_encrypt:
