model:
  fusion_mode: ours
  alignment:
    enabled: true
    adaptive_bias: true
    penalty_scale: 0.5
    bonus_scale: 1.0
    context_scale: 0.35
  gate:
    mode: learned
    quality_inputs: true
    uncertainty_inputs: true
    detach: true

train:
  exp_name: ratio_full_i1_i2_i3_adapt_000
  epochs: 60
  historical_epochs: 60
  adaptation_epochs: 0
  adaptation_ratio: 0.0
  replay_ratio: 0.0
  replay_strategy: static

loss:
  semantic_alignment_weight: 0.03
  class_aware_alignment_same_class_weight: 0.25
  gate_oracle_weight: 0.0