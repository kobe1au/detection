data:
  adapt_pt_dir: "pts/adapt"
  adapt_csv: "resource/dataset_split_2018_2024/adapt_2023.csv"

model:
  fusion_mode: ours
  alignment:
    enabled: false
    adaptive_bias: false
    drift_guided: false
    penalty_scale: 0.0
    bonus_scale: 0.0
    context_scale: 0.0

train:
  exp_name: i2_paired_alignment_only_adapt_010
  epochs: 70
  historical_epochs: 60
  adaptation_epochs: 10
  adaptation_ratio: 0.10
  replay_ratio: 0.25

loss:
  semantic_alignment_weight: 0.03
  class_aware_alignment_same_class_weight: 0.0

