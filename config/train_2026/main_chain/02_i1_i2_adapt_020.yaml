data:
  adapt_pt_dir: "/pts/test"
  adapt_csv: "results/labels/test_2023.csv"

model:
  fusion_mode: ours
  alignment:
    enabled: true
    adaptive_bias: true
    penalty_scale: 0.5
    bonus_scale: 1.0
    context_scale: 0.35

train:
  exp_name: continual_b2_i1_i2_adapt_020
  epochs: 70
  historical_epochs: 60
  adaptation_epochs: 10
  adaptation_ratio: 0.20
  replay_ratio: 0.25
  replay_strategy: drift_matched
  adaptation_selection: dbta

loss:
  semantic_alignment_weight: 0.03
  class_aware_alignment_same_class_weight: 0.25
