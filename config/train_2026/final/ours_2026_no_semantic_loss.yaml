train:
  exp_name: final_ours_2026_no_semantic_loss

model:
  fusion_mode: ours
  alignment:
    enabled: true
    adaptive_bias: true
    drift_guided: true
    penalty_scale: 0.5
    bonus_scale: 1.0
    context_scale: 0.35
  gate:
    mode: learned
    quality_inputs: true
    drift_inputs: true

loss:
  semantic_alignment_weight: 0.0
  class_aware_alignment_same_class_weight: 0.0
  gate_oracle_weight: 0.05
  gate_oracle_smoothing: 0.10
  gate_oracle_start_phase: adaptation
  gate_oracle_adaptation_only: true
