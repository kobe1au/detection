train:
  exp_name: final_no_future_proto

model:
  fusion_mode: ours
  temporal:
    use_future_drift: false
  alignment:
    enabled: true
    adaptive_bias: true
    drift_guided: true
    bonus_scale: 1.0
    context_scale: 0.35
  gate:
    mode: learned
    quality_inputs: true
    drift_inputs: true

loss:
  temporal_proto_current_weight: 0.005
  temporal_proto_future_weight: 0.0
  temporal_risk_calibration_weight: 0.10
  semantic_alignment_weight: 0.03
