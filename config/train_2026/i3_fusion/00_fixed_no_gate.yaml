train:
  exp_name: i3_00_fixed_no_gate

model:
  fusion_mode: ours
  alignment:
    enabled: true
    adaptive_bias: true
    drift_guided: true
    penalty_scale: 0.5
    bonus_scale: 1.0
    context_scale: 0.35
  gate:
    mode: fixed
    quality_inputs: false
    drift_inputs: false

loss:
  semantic_alignment_weight: 0.03
  class_aware_alignment_same_class_weight: 0.25
  gate_oracle_weight: 0.0
