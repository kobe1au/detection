data:
  adapt_pt_dir: "pts/adapt"
  adapt_csv: "resource/dataset_split_2018_2024/adapt_2023.csv"
  test_pt_dir: "pts/test"
  test_csv: "resource/dataset_split_2018_2024/test_2024.csv"
  extra_tests: []

train:
  exp_name: continual_03_i1_i2_i3_adapt_100
  epochs: 70
  historical_epochs: 60
  adaptation_epochs: 10
  adaptation_ratio: 1.0
  replay_ratio: 0.25

model:
  fusion_mode: ours
  alignment:
    enabled: true
    adaptive_bias: true
    drift_guided: true
    penalty_scale: 0.5
    bonus_scale: 1.0
    context_scale: 0.35
  gate:
    mode: learned
    quality_inputs: true
    drift_inputs: true

loss:
 
  semantic_alignment_weight: 0.03
  class_aware_alignment_same_class_weight: 0.25
  gate_oracle_weight: 0.05
  gate_oracle_smoothing: 0.10
  gate_oracle_start_phase: adaptation
  gate_oracle_adaptation_only: true
