# Ablation: graph_semantic_source = zero
# Graph semantic counts are forced to all zeros. Use this config to verify
# that soft consistency / gate prior derive non-trivial signal from the
# graph branch's structural-context categories (and not from any cross-modal
# leakage).
data:
  root: ""
  out_dir: "experiments/tri_modal_robust_graph_zero"
  train_pt_dir: "E:/pts_tri/train"
  val_pt_dir: "C:/pts_tri/val"
  test_pt_dir: "D:/pts_tri/test"
  train_csv: "results/labels/train.csv"
  val_csv: "results/labels/val.csv"
  test_csv: "results/labels/test.csv"
  max_api_events_per_sample: 1024
  max_failed_ratio: 0.0
  graph_semantic_source: "zero"

model:
  num_classes: 2
  fusion_mode: "tri_modal_ours"
  max_nodes_gnn: 12288
  joint_emb_dim: 128

  api_encoder:
    type: "transformer"
    num_hash_buckets: 8192
    type_vocab_size: 16
    emb_dim: 128
    hidden_dim: 256
    dropout: 0.15
    max_seq_len: 1024
    layers: 2
    heads: 4

  graph_encoder:
    type: "gatv2"
    emb_dim: 128
    hidden: 128
    heads: 4
    layers: 2
    use_behavior_hint: true
    drop_extracted_behavior_hints: true

  manifest_encoder:
    enabled: true
    in_dim: 256
    category_dim: 12
    stats_dim: 11
    permission_dim: 128
    intent_dim: 64
    feature_dim: 32
    emb_dim: 128
    hidden_dim: 256
    dropout: 0.1

  gate:
    hidden_dim: 128
    detach: true

train:
  exp_name: "tri_modal_robust_graph_zero"
  seed: 42
  device: "auto"
  use_amp: true
  epochs: 80
  batch_size: 32
  eval_batch_size: 32
  grad_accum_steps: 1
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  lr: 0.0003
  weight_decay: 0.01
  eta_min: 0.000001
  label_smoothing: 0.05
  patience: 10
  min_delta: 0.0001
  grad_clip: 1.0

loss:
  branch_aux_weight: 0.05
  soft_consistency_weight: 0.0
  gate_prior_weight: 0.0

robust:
  train_aug: true
  perturb_prob: 0.5
  perturb_strengths: [0.1, 0.3, 0.5]
  degrade_category_counts: true

eval:
  perturb_strength: 0.5
  perturb_strengths: [0.1, 0.3, 0.5, 0.7, 0.9]
  perturb_tests:
    - clean
    - api_degraded
    - graph_degraded
    - api_graph_degraded
    - manifest_degraded
    - all_degraded
    - api_missing
    - graph_missing
    - manifest_missing
