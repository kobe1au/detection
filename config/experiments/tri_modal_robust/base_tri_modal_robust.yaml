log_level: INFO

data:
  root: ""
  train_pt_dir: /root/autodl-tmp/pts/train
  val_pt_dir: /root/autodl-tmp/pts/val
  test_pt_dir: /pts/test
  train_csv: results/labels/train.csv
  val_csv: results/labels/val.csv
  test_csv: results/labels/test.csv
  out_dir: results/tri_modal_robust
  max_failed_ratio: 0.0
  max_api_events_per_sample: 1024
  graph_semantic_source: alignment
  strict_split_integrity: true
  strict_partition_isolation: true

train:
  exp_name: base_tri_modal_robust
  seed: 42
  tuning_mode: false
  deterministic: true
  device: auto
  epochs: 60
  patience: 8
  min_delta: 0.0001
  batch_size: 32
  eval_batch_size: 64
  num_workers: 8
  eval_num_workers: 2
  pin_memory: false
  allow_pyg_pin_memory: false
  persistent_workers: true
  use_amp: true
  lr: 0.0003
  eta_min: 0.000001
  weight_decay: 0.01
  grad_clip: 1.0
  grad_accum_steps: 1
  label_smoothing: 0.0
  checkpoint_metric: robust_composite

model:
  num_classes: 2
  fusion_mode: tri_modal_ours
  joint_emb_dim: 128
  max_nodes_gnn: 12288

  api_encoder:
    type: transformer
    num_hash_buckets: 8192
    type_vocab_size: 16
    emb_dim: 128
    hidden_dim: 256
    dropout: 0.15
    layers: 2
    heads: 4
    max_seq_len: 1024

  graph_encoder:
    type: gatv2
    emb_dim: 128
    hidden: 128
    heads: 4
    layers: 2
    use_behavior_hint: true
    drop_extracted_behavior_hints: false

  manifest_encoder:
    enabled: true
    in_dim: 256
    emb_dim: 128
    hidden_dim: 256
    dropout: 0.1
    category_dim: 12
    stats_dim: 11
    permission_dim: 128
    intent_dim: 64
    feature_dim: 32

  gate:
    hidden_dim: 128
    detach: true
    use_consistency_evidence: true
    use_conflict_evidence: true
    use_perturbation_evidence: false
    apply_alive_mask: true

loss:
  branch_aux_weight: 0.05
  semantic_reconstruction_weight: 0.0
  cross_source_consistency_weight: 0.0
  gate_prior_weight: 0.0
  cross_source_min_reliability: 0.0
  cross_source_min_consistency: 0.0
  semantic_active_only: false

robust:
  train_aug: true
  perturb_prob: 0.5
  perturb_strengths: [0.1, 0.3, 0.5]
  degrade_category_counts: true

eval:
  run_test: true
  run_robust_test: true

  robust_val:
    enabled: true
    clean_weight: 0.4
    scenarios:
      - name: api_graph_degraded_s0.5
        perturb_type: api_graph_degraded
        strength: 0.5
        weight: 0.25
      - name: manifest_degraded_s0.5
        perturb_type: manifest_degraded
        strength: 0.5
        weight: 0.15
      - name: all_degraded_s0.5
        perturb_type: all_degraded
        strength: 0.5
        weight: 0.1
      - name: api_missing
        perturb_type: api_missing
        strength: 1.0
        weight: 0.0333333333
      - name: graph_missing
        perturb_type: graph_missing
        strength: 1.0
        weight: 0.0333333333
      - name: manifest_missing
        perturb_type: manifest_missing
        strength: 1.0
        weight: 0.0333333334

  perturb_strengths: [0.1, 0.3, 0.5, 0.7, 0.9]
  perturb_tests:
    - clean
    - api_degraded
    - graph_degraded
    - api_graph_degraded
    - manifest_degraded
    - all_degraded
    - api_missing
    - graph_missing
    - manifest_missing
