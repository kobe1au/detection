data:
  strict_integrity: true
  enforce_package_isolation: true

  train:
    pt_dir: /root/autodl-tmp/pts/train
    csv: labels/train.csv

  val:
    pt_dir: /root/autodl-tmp/pts/val
    csv: labels/val.csv

  test:
    pt_dir: /root/autodl-tmp/pts/test
    csv: labels/test.csv

train:
  seed: 42
  device: auto
  output_dir: results/aeg_robust/default

  epochs: 60
  patience: 8
  batch_size: 32
  eval_batch_size: 96

  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0

  # Select every staged method on clean validation only. Robust test metrics
  # remain post-hoc evidence instead of leaking into checkpoint selection.
  checkpoint_metric: macro_f1
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4

eval:
  seed: 2026
  robust_eval: true

  robust_views:
    - api_degraded
    - graph_degraded
    - api_graph_degraded
    - manifest_noisy
    - manifest_shuffled
    - manifest_noisy_blind
    - manifest_shuffled_blind
    - api_missing
    - graph_missing
    - manifest_missing
    - all_degraded

  perturb_strengths:
    - 0.5

  robust_val:
    enabled: false
    clean_weight: 0.5
    scenarios:
      - name: api_graph_degraded
        view: api_graph_degraded
        strength: 0.5
        weight: 0.4
      - name: manifest_noisy
        view: manifest_noisy
        strength: 0.5
        weight: 0.3
      - name: all_degraded
        view: all_degraded
        strength: 0.5
        weight: 0.3

robust:
  train_aug: false
  # When an innovation-3 config enables training augmentation, every sample
  # receives a real degraded view instead of wasting a second clean forward.
  perturb_prob: 1.0
  perturb_strengths:
    - 0.1
    - 0.3
    - 0.5

  train_views:
    - api_degraded
    - graph_degraded
    - api_graph_degraded
    - manifest_noisy
    - manifest_shuffled
    - manifest_noisy_blind
    - manifest_shuffled_blind
    - manifest_missing
    - all_degraded

  manifest_donor_mode: cyclic

loss:
  mode: ce_only
  ce_weight: 1.0
  consistency_weight: 0.0
  aug_ce_weight: 0.0

model:
  hidden_dim: 128
  layers: 2
  dropout: 0.15
  num_latents: 16
  fusion_mode: masked_mean
  num_classes: 2

  use_relation_types: true
  use_node_types: true
  use_node_source: true
  use_edge_source: true
  use_node_quality: true
  use_edge_quality: true

  reliability_bias_weight: 0.0
  conflict_bias_weight: 0.0
  source_bias_weight: 0.0

  allow_node_dim_adapt: false
