data:
  strict_integrity: true
  enforce_package_isolation: true

  train:
    pt_dir: D:/pts_aeg/train
    csv: results/labels/train.csv

  val:
    pt_dir: D:/pts_aeg/val
    csv: results/labels/val.csv

  test:
    pt_dir: D:/pts_aeg/test
    csv: results/labels/test.csv

train:
  seed: 42
  device: auto
  output_dir: results/aeg_robust/default

  epochs: 60
  patience: 8
  batch_size: 24
  eval_batch_size: 48

  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0

  checkpoint_metric: robust_composite
  num_workers: 0
  pin_memory: false

eval:
  seed: 2026
  robust_eval: true

  robust_views:
    - api_degraded
    - graph_degraded
    - api_graph_degraded
    - manifest_noisy
    - manifest_shuffled
    - manifest_noisy_blind
    - manifest_shuffled_blind
    - api_missing
    - graph_missing
    - manifest_missing
    - all_degraded

  perturb_strengths:
    - 0.5

  robust_val:
    enabled: true
    clean_weight: 0.5
    scenarios:
      - name: api_graph_degraded
        view: api_graph_degraded
        strength: 0.5
        weight: 0.4
      - name: manifest_noisy
        view: manifest_noisy
        strength: 0.5
        weight: 0.3
      - name: all_degraded
        view: all_degraded
        strength: 0.5
        weight: 0.3

robust:
  train_aug: true
  perturb_prob: 0.5
  perturb_strengths:
    - 0.1
    - 0.3
    - 0.5

  train_views:
    - api_degraded
    - graph_degraded
    - api_graph_degraded
    - manifest_noisy
    - manifest_shuffled
    - manifest_missing
    - all_degraded

  manifest_donor_mode: cyclic

loss:
  mode: compact_kl
  ce_weight: 1.0
  consistency_weight: 0.05
  aug_ce_weight: 0.0

model:
  hidden_dim: 128
  layers: 2
  dropout: 0.15
  num_latents: 16
  fusion_mode: latent
  num_classes: 2

  use_relation_types: true
  use_node_types: true
  use_node_source: true
  use_edge_source: true
  use_node_quality: true
  use_edge_quality: true

  reliability_bias_weight: 1.0
  conflict_bias_weight: 0.5
  source_bias_weight: 1.0

  allow_node_dim_adapt: false