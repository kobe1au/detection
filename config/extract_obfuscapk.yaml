data:
  split_dirs:
    rebuild: "D:/obfuscapk_benchmark/apks/rebuild"
    rename: "D:/obfuscapk_benchmark/apks/rename"
    string_encrypt: "D:/obfuscapk_benchmark/apks/string_encrypt"
    reflection: "D:/obfuscapk_benchmark/apks/reflection"
    call_indirection: "D:/obfuscapk_benchmark/apks/call_indirection"
    control_flow: "D:/obfuscapk_benchmark/apks/control_flow"
    junk_code: "D:/obfuscapk_benchmark/apks/junk_code"
    manifest_noise: "D:/obfuscapk_benchmark/apks/manifest_noise"
  out_root: "D:/pts_obfuscapk"
  out_dirs:
    rebuild: "D:/pts_obfuscapk/rebuild"
    rename: "D:/pts_obfuscapk/rename"
    string_encrypt: "D:/pts_obfuscapk/string_encrypt"
    reflection: "D:/pts_obfuscapk/reflection"
    call_indirection: "D:/pts_obfuscapk/call_indirection"
    control_flow: "D:/pts_obfuscapk/control_flow"
    junk_code: "D:/pts_obfuscapk/junk_code"
    manifest_noise: "D:/pts_obfuscapk/manifest_noise"
  splits:
    - rebuild
    - rename
    - string_encrypt
    - reflection
    - call_indirection
    - control_flow
    - junk_code
    - manifest_noise

hyperparameters:
  vocab_size: 256

graph:
  sensitive_hops: 1
  use_behavior_hints: false
  max_methods_per_dex: 4096
  fallback_max_methods: 512
  fallback_policy: api_rich

api:
  num_hash_buckets: 8192
  max_events_per_dex: 1024
  max_events_per_method: 32
  event_scope: all_methods
  framework_only: true
  include_descriptor: false

manifest:
  # Reuse the train-only vocab from clean train. Do not rebuild from obfuscated test APKs.
  vocab_path: "C:/pts_tri/manifest_vocab.yaml"
  rebuild_vocab: false
  allow_empty_vocab: false
  manifest_dim: 256
  max_permissions: 128
  max_intents: 64
  max_features: 32
  save_manifest_jsonl: true
  manifest_jsonl_dir: ""

storage:
  keep_method_names: false
  keep_api_tokens: false

execution:
  workers: 4
  resume: true
  allow_legacy_resume: false
  fail_on_error: false
  # Obfuscapk techniques are often generated incrementally; do not require
  # every configured technique directory to be non-empty in each extraction run.
  allow_empty_splits: true
  failed_json: ""
