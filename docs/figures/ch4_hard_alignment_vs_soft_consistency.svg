<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#222"/>
    </marker>
    <style>
      .page{fill:#fff}
      .frame{fill:none;stroke:#222;stroke-width:1.5;stroke-dasharray:7 5}
      .box{fill:#fff;stroke:#222;stroke-width:1.6}
      .red{fill:#fff1f1;stroke:#b75d5d;stroke-width:1.5}
      .blue{fill:#eaf3ff;stroke:#5d86bd;stroke-width:1.5}
      .green{fill:#f1faf2;stroke:#6d9c74;stroke-width:1.5}
      .yellow{fill:#fff9e8;stroke:#c6a24d;stroke-width:1.5}
      .arrow{stroke:#222;stroke-width:1.7;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#777;stroke-width:1.5;stroke-dasharray:6 5;fill:none;marker-end:url(#arrow)}
      .txt{font-family:"SimSun","Songti SC","Microsoft YaHei",Arial,sans-serif;fill:#333;font-size:18px;text-anchor:middle;dominant-baseline:middle}
      .small{font-size:15.5px}
      .tiny{font-size:14px}
      .title{font-size:21px;font-weight:600}
      .redtxt{fill:#8b3434}
      .bluetxt{fill:#315f95}
      .greentxt{fill:#35683b}
      .yellowtxt{fill:#735815}
    </style>
  </defs>

  <rect class="page" width="1120" height="700"/>
  <text class="txt title" x="560" y="34">硬对齐与软一致性机制对比</text>

  <!-- left: hard alignment -->
  <rect class="frame" x="58" y="82" width="480" height="550" rx="24"/>
  <text class="txt title redtxt" x="298" y="120">硬对齐方式</text>
  <text class="txt small" x="298" y="148">将 Manifest 视为固定参照</text>

  <rect class="blue" x="120" y="196" width="170" height="58" rx="8"/>
  <text class="txt bluetxt" x="205" y="225">API 表示</text>

  <rect class="blue" x="120" y="306" width="170" height="58" rx="8"/>
  <text class="txt bluetxt" x="205" y="335">Graph 表示</text>

  <rect class="yellow" x="330" y="252" width="160" height="58" rx="8"/>
  <text class="txt yellowtxt" x="410" y="281">Manifest 表示</text>

  <line class="arrow" x1="290" y1="225" x2="330" y2="268"/>
  <line class="arrow" x1="290" y1="335" x2="330" y2="294"/>

  <rect class="red" x="156" y="430" width="284" height="72" rx="8"/>
  <text class="txt redtxt" x="298" y="454">强制表示接近</text>
  <text class="txt tiny redtxt" x="298" y="480">声明噪声可能传递到代码表示</text>

  <line class="arrow" x1="410" y1="310" x2="298" y2="430"/>

  <rect class="red" x="128" y="540" width="340" height="58" rx="8"/>
  <text class="txt redtxt" x="298" y="568">风险：权限冗余、声明未使用、表征干扰</text>

  <line class="arrow" x1="298" y1="502" x2="298" y2="540"/>

  <!-- right: soft consistency -->
  <rect class="frame" x="582" y="82" width="480" height="550" rx="24"/>
  <text class="txt title greentxt" x="822" y="120">本文软一致性方式</text>
  <text class="txt small" x="822" y="148">Manifest 仅作为辅助声明证据</text>

  <rect class="blue" x="634" y="190" width="160" height="54" rx="8"/>
  <text class="txt bluetxt" x="714" y="217">API</text>

  <rect class="blue" x="634" y="290" width="160" height="54" rx="8"/>
  <text class="txt bluetxt" x="714" y="317">Graph</text>

  <rect class="blue" x="850" y="240" width="160" height="54" rx="8"/>
  <text class="txt bluetxt" x="930" y="267">Manifest</text>

  <rect class="yellow" x="690" y="390" width="264" height="64" rx="8"/>
  <text class="txt yellowtxt" x="822" y="414">统一安全语义类别空间</text>
  <text class="txt tiny yellowtxt" x="822" y="438">仅比较功能类别相似程度</text>

  <line class="arrow" x1="714" y1="244" x2="760" y2="390"/>
  <line class="arrow" x1="714" y1="344" x2="790" y2="390"/>
  <line class="arrow" x1="930" y1="294" x2="884" y2="390"/>

  <rect class="green" x="688" y="504" width="268" height="72" rx="8"/>
  <text class="txt greentxt" x="822" y="528">非强制一致性信号</text>
  <text class="txt tiny greentxt" x="822" y="554">参与训练与融合，不替代代码证据</text>

  <line class="arrow" x1="822" y1="454" x2="822" y2="504"/>

  <rect class="green" x="660" y="604" width="324" height="42" rx="8"/>
  <text class="txt greentxt" x="822" y="625">降低 Manifest 声明噪声的误导</text>

  <line class="arrow" x1="822" y1="576" x2="822" y2="604"/>
</svg>
