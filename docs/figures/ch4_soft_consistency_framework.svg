<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#222"/>
    </marker>
    <style>
      .page{fill:#fff}
      .outer{fill:none;stroke:#222;stroke-width:1.5;stroke-dasharray:7 5}
      .box{fill:#fff;stroke:#222;stroke-width:1.6}
      .tag{fill:#eaf3ff;stroke:#5d86bd;stroke-width:1.5}
      .semantic{fill:#fff9e8;stroke:#c6a24d;stroke-width:1.5}
      .cons{fill:#f7f7f7;stroke:#555;stroke-width:1.4}
      .out{fill:#f1faf2;stroke:#6d9c74;stroke-width:1.5}
      .arrow{stroke:#222;stroke-width:1.7;fill:none;marker-end:url(#arrow)}
      .plain{stroke:#222;stroke-width:1.4;fill:none}
      .txt{font-family:"SimSun","Songti SC","Microsoft YaHei",Arial,sans-serif;fill:#333;font-size:18px;text-anchor:middle;dominant-baseline:middle}
      .small{font-size:15.5px}
      .tiny{font-size:14px}
      .title{font-size:21px;font-weight:600}
      .blue{fill:#315f95}
      .yellow{fill:#735815}
      .green{fill:#35683b}
    </style>
  </defs>

  <rect class="page" width="1120" height="760"/>
  <text class="txt title" x="560" y="34">跨源软一致性学习总体框架</text>

  <rect class="outer" x="54" y="70" width="1012" height="612" rx="28"/>

  <!-- input modalities -->
  <rect class="box" x="90" y="118" width="230" height="70" rx="10"/>
  <text class="txt" x="205" y="144">API 调用序列</text>
  <text class="txt small" x="205" y="170">代码行为证据</text>

  <rect class="box" x="445" y="118" width="230" height="70" rx="10"/>
  <text class="txt" x="560" y="144">调用图</text>
  <text class="txt small" x="560" y="170">结构上下文证据</text>

  <rect class="box" x="800" y="118" width="230" height="70" rx="10"/>
  <text class="txt" x="915" y="144">Manifest 声明信息</text>
  <text class="txt small" x="915" y="170">声明能力证据</text>

  <line class="arrow" x1="205" y1="188" x2="205" y2="246"/>
  <line class="arrow" x1="560" y1="188" x2="560" y2="246"/>
  <line class="arrow" x1="915" y1="188" x2="915" y2="246"/>

  <!-- mapping -->
  <rect class="tag" x="90" y="246" width="230" height="64" rx="8"/>
  <text class="txt blue" x="205" y="272">API 类别计数</text>
  <text class="txt tiny blue" x="205" y="296">行为类别统计</text>

  <rect class="tag" x="445" y="246" width="230" height="64" rx="8"/>
  <text class="txt blue" x="560" y="272">Graph 类别计数</text>
  <text class="txt tiny blue" x="560" y="296">节点语义统计</text>

  <rect class="tag" x="800" y="246" width="230" height="64" rx="8"/>
  <text class="txt blue" x="915" y="272">Manifest 类别计数</text>
  <text class="txt tiny blue" x="915" y="296">声明类别统计</text>

  <!-- unified space -->
  <line class="arrow" x1="205" y1="310" x2="410" y2="380"/>
  <line class="arrow" x1="560" y1="310" x2="560" y2="380"/>
  <line class="arrow" x1="915" y1="310" x2="710" y2="380"/>

  <rect class="semantic" x="320" y="380" width="480" height="76" rx="10"/>
  <text class="txt yellow" x="560" y="406">统一安全语义类别空间</text>
  <text class="txt tiny yellow" x="560" y="434">网络、短信、定位、联系人、存储、动态加载、组件暴露等</text>

  <line class="arrow" x1="560" y1="456" x2="560" y2="504"/>

  <!-- consistency -->
  <rect class="cons" x="180" y="504" width="220" height="64" rx="8"/>
  <text class="txt small" x="290" y="528">API-Manifest 一致性</text>
  <text class="txt tiny" x="290" y="552">代码行为与声明能力</text>

  <rect class="cons" x="450" y="504" width="220" height="64" rx="8"/>
  <text class="txt small" x="560" y="528">Graph-Manifest 一致性</text>
  <text class="txt tiny" x="560" y="552">结构语义与声明能力</text>

  <rect class="cons" x="720" y="504" width="220" height="64" rx="8"/>
  <text class="txt small" x="830" y="528">API-Graph 一致性</text>
  <text class="txt tiny" x="830" y="552">代码行为与结构语义</text>

  <line class="plain" x1="560" y1="482" x2="560" y2="504"/>
  <line class="plain" x1="290" y1="482" x2="830" y2="482"/>
  <line class="arrow" x1="290" y1="482" x2="290" y2="504"/>
  <line class="arrow" x1="560" y1="482" x2="560" y2="504"/>
  <line class="arrow" x1="830" y1="482" x2="830" y2="504"/>

  <!-- outputs -->
  <line class="arrow" x1="290" y1="568" x2="425" y2="628"/>
  <line class="arrow" x1="560" y1="568" x2="560" y2="628"/>
  <line class="arrow" x1="830" y1="568" x2="695" y2="628"/>

  <rect class="out" x="350" y="628" width="420" height="54" rx="8"/>
  <text class="txt green" x="560" y="650">软一致性信号</text>
  <text class="txt tiny green" x="560" y="671">作为训练辅助项与融合证据</text>
</svg>
