<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#222"/>
    </marker>
    <style>
      .page{fill:#fff}
      .frame{fill:none;stroke:#222;stroke-width:1.5;stroke-dasharray:7 5}
      .box{fill:#fff;stroke:#222;stroke-width:1.6}
      .blue{fill:#eaf3ff;stroke:#5d86bd;stroke-width:1.5}
      .red{fill:#fff1f1;stroke:#b75d5d;stroke-width:1.5}
      .green{fill:#f1faf2;stroke:#6d9c74;stroke-width:1.5}
      .yellow{fill:#fff9e8;stroke:#c6a24d;stroke-width:1.5}
      .arrow{stroke:#222;stroke-width:1.7;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#777;stroke-width:1.5;stroke-dasharray:6 5;fill:none;marker-end:url(#arrow)}
      .txt{font-family:"SimSun","Songti SC","Microsoft YaHei",Arial,sans-serif;fill:#333;font-size:18px;text-anchor:middle;dominant-baseline:middle}
      .small{font-size:15.5px}
      .title{font-size:21px;font-weight:600}
      .redtxt{fill:#8b3434}
      .bluetxt{fill:#315f95}
      .greentxt{fill:#35683b}
      .yellowtxt{fill:#755b13}
    </style>
  </defs>

  <rect class="page" width="1120" height="720"/>
  <text class="txt title" x="560" y="38">代码共模失效与 Manifest 异源证据示意图</text>

  <rect class="box" x="460" y="72" width="200" height="50"/>
  <text class="txt" x="560" y="97">Android APK 样本</text>

  <line class="arrow" x1="520" y1="122" x2="325" y2="166"/>
  <line class="arrow" x1="600" y1="122" x2="795" y2="166"/>

  <!-- Code source branch -->
  <rect class="frame" x="56" y="156" width="572" height="432" rx="24"/>
  <text class="txt title" x="342" y="188">代码静态分析来源</text>

  <rect class="blue" x="214" y="220" width="256" height="54"/>
  <text class="txt bluetxt" x="342" y="247">DEX 字节码静态分析</text>

  <line class="arrow" x1="342" y1="274" x2="342" y2="320"/>
  <rect class="red" x="124" y="320" width="436" height="70" rx="8"/>
  <text class="txt redtxt" x="342" y="344">反射调用、动态加载、代码加壳等混淆技术</text>
  <text class="txt small redtxt" x="342" y="370">使真实 API 调用与方法关系难以完整恢复</text>

  <line class="arrow" x1="282" y1="390" x2="190" y2="446"/>
  <line class="arrow" x1="402" y1="390" x2="494" y2="446"/>

  <rect class="red" x="86" y="446" width="208" height="86" rx="10"/>
  <text class="txt redtxt" x="190" y="474">API 模态退化</text>
  <text class="txt small redtxt" x="190" y="502">调用缺失 / 序列变短</text>

  <rect class="red" x="390" y="446" width="208" height="86" rx="10"/>
  <text class="txt redtxt" x="494" y="474">Graph 模态退化</text>
  <text class="txt small redtxt" x="494" y="502">缺边 / 缺节点</text>

  <line class="arrow" x1="190" y1="532" x2="288" y2="616"/>
  <line class="arrow" x1="494" y1="532" x2="396" y2="616"/>

  <rect class="red" x="222" y="616" width="240" height="56" rx="8"/>
  <text class="txt redtxt" x="342" y="644">代码侧证据可靠性下降</text>

  <!-- Manifest branch -->
  <rect class="frame" x="690" y="156" width="374" height="432" rx="24"/>
  <text class="txt title" x="877" y="188">声明信息来源</text>

  <rect class="blue" x="756" y="220" width="242" height="54"/>
  <text class="txt bluetxt" x="877" y="247">Manifest 文件解析</text>

  <line class="arrow" x1="877" y1="274" x2="877" y2="326"/>

  <rect class="green" x="736" y="326" width="282" height="82" rx="10"/>
  <text class="txt greentxt" x="877" y="354">声明信息</text>
  <text class="txt small greentxt" x="877" y="382">权限、组件、意图过滤器、系统版本</text>

  <line class="arrow" x1="877" y1="408" x2="877" y2="462"/>

  <rect class="yellow" x="736" y="462" width="282" height="82" rx="10"/>
  <text class="txt yellowtxt" x="877" y="490">声明信息也存在噪声</text>
  <text class="txt small yellowtxt" x="877" y="518">权限冗余、第三方库声明、声明未使用</text>

  <line class="arrow" x1="877" y1="544" x2="877" y2="616"/>

  <rect class="yellow" x="752" y="616" width="250" height="56" rx="8"/>
  <text class="txt yellowtxt" x="877" y="644">声明模态可靠性需建模</text>

  <!-- Bottom implication -->
  <line class="arrow" x1="462" y1="644" x2="522" y2="644"/>
  <line class="arrow" x1="752" y1="644" x2="598" y2="644"/>

  <rect class="box" x="522" y="618" width="76" height="52" rx="8"/>
  <text class="txt small" x="560" y="635">三模态</text>
  <text class="txt small" x="560" y="655">可靠性建模</text>
</svg>
