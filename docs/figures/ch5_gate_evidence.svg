<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#222"/>
    </marker>
    <style>
      .page{fill:#fff}
      .src{fill:#eaf3ff;stroke:#5d86bd;stroke-width:1.4}
      .mid{fill:#f1faf2;stroke:#6d9c74;stroke-width:1.4}
      .out{fill:#fff9e8;stroke:#c6a24d;stroke-width:1.4}
      .note{fill:#f7f7f7;stroke:#666;stroke-width:1.3}
      .arrow{stroke:#222;stroke-width:1.6;fill:none;marker-end:url(#arrow)}
      .dashArrow{stroke:#666;stroke-width:1.4;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}
      .txt{font-family:"SimSun","Songti SC","Microsoft YaHei",Arial,sans-serif;fill:#222;text-anchor:middle;dominant-baseline:middle;font-size:17px}
      .small{font-size:14px}
      .tiny{font-size:13px}
      .title{font-size:21px;font-weight:600}
      .blue{fill:#315f95}
      .green{fill:#35683b}
      .brown{fill:#735815}
      .gray{fill:#555}
    </style>
  </defs>

  <rect class="page" width="1120" height="600"/>
  <text class="txt title" x="560" y="34">门控证据与权重生成示意图</text>

  <!-- Evidence components -->
  <rect class="src" x="70" y="105" width="220" height="78" rx="7"/>
  <text class="txt blue" x="180" y="128">可靠性证据</text>
  <text class="txt tiny blue" x="180" y="153">质量、退化、可靠性</text>
  <text class="txt tiny blue" x="180" y="173">可用状态、对应质量</text>

  <rect class="src" x="70" y="230" width="220" height="78" rx="7"/>
  <text class="txt blue" x="180" y="253">一致性证据</text>
  <text class="txt tiny blue" x="180" y="278">API-Manifest</text>
  <text class="txt tiny blue" x="180" y="298">Graph-Manifest、API-Graph</text>

  <rect class="src" x="70" y="355" width="220" height="78" rx="7"/>
  <text class="txt blue" x="180" y="378">分支状态证据</text>
  <text class="txt tiny blue" x="180" y="403">API / Graph / Manifest / Joint</text>
  <text class="txt tiny blue" x="180" y="423">分支置信度</text>

  <!-- Evidence vector -->
  <rect class="mid" x="350" y="235" width="120" height="76" rx="7"/>
  <text class="txt green" x="410" y="258">证据汇总</text>
  <text class="txt tiny green" x="410" y="282">统一整理</text>

  <rect class="mid" x="535" y="230" width="190" height="86" rx="7"/>
  <text class="txt green" x="630" y="254">融合证据向量</text>
  <text class="txt small green" x="630" y="282">样本级证据拼接</text>

  <!-- Gate network -->
  <rect class="mid" x="785" y="230" width="150" height="86" rx="7"/>
  <text class="txt green" x="860" y="254">门控网络</text>
  <text class="txt small green" x="860" y="282">输出权重分布</text>

  <!-- Weight vector -->
  <rect class="out" x="970" y="184" width="130" height="178" rx="7"/>
  <text class="txt brown" x="1035" y="212">四分支权重</text>
  <text class="txt small brown" x="1035" y="248">w_api</text>
  <text class="txt small brown" x="1035" y="286">w_graph</text>
  <text class="txt small brown" x="1035" y="324">w_manifest</text>
  <text class="txt small brown" x="1035" y="352">w_joint</text>

  <!-- Gate prior -->
  <rect class="note" x="735" y="430" width="250" height="64" rx="7"/>
  <text class="txt small gray" x="860" y="452">门控先验弱约束</text>
  <text class="txt tiny gray" x="860" y="475">训练阶段引导权重学习</text>

  <!-- Information flow -->
  <path class="arrow" d="M290 144 H320 V258 H350"/>
  <path class="arrow" d="M290 269 H350"/>
  <path class="arrow" d="M290 394 H320 V288 H350"/>
  <path class="arrow" d="M470 273 H535"/>
  <path class="arrow" d="M725 273 H785"/>
  <path class="arrow" d="M935 273 H970"/>
  <path class="dashArrow" d="M860 430 V316"/>

  <text class="txt tiny gray" x="775" y="525">虚线箭头表示训练阶段约束，实线箭头表示推理阶段信息流</text>
</svg>
