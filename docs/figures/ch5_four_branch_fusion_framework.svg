<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#222"/>
    </marker>
    <style>
      .page{fill:#fff}
      .box{fill:#fff;stroke:#222;stroke-width:1.5}
      .input{fill:#f7f7f7;stroke:#333;stroke-width:1.4}
      .enc{fill:#eaf3ff;stroke:#5d86bd;stroke-width:1.4}
      .branch{fill:#fff9e8;stroke:#c6a24d;stroke-width:1.4}
      .gate{fill:#f1faf2;stroke:#6d9c74;stroke-width:1.4}
      .out{fill:#f7f7f7;stroke:#333;stroke-width:1.5}
      .group{fill:none;stroke:#777;stroke-width:1.2;stroke-dasharray:6 5}
      .arrow{stroke:#222;stroke-width:1.6;fill:none;marker-end:url(#arrow)}
      .dashArrow{stroke:#666;stroke-width:1.4;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}
      .txt{font-family:"SimSun","Songti SC","Microsoft YaHei",Arial,sans-serif;fill:#222;text-anchor:middle;dominant-baseline:middle;font-size:17px}
      .small{font-size:14px}
      .tiny{font-size:13px}
      .title{font-size:21px;font-weight:600}
      .blue{fill:#315f95}
      .brown{fill:#735815}
      .green{fill:#35683b}
      .grayText{fill:#555}
    </style>
  </defs>

  <rect class="page" width="1180" height="680"/>
  <text class="txt title" x="590" y="34">四分支自适应融合总体框架</text>

  <!-- Left: three modal inputs and encoders -->
  <rect class="input" x="60" y="105" width="150" height="48" rx="5"/>
  <text class="txt small" x="135" y="129">API 调用序列</text>
  <rect class="enc" x="260" y="105" width="145" height="48" rx="5"/>
  <text class="txt small blue" x="332.5" y="129">API 编码器</text>

  <rect class="input" x="60" y="205" width="150" height="48" rx="5"/>
  <text class="txt small" x="135" y="229">调用图</text>
  <rect class="enc" x="260" y="205" width="145" height="48" rx="5"/>
  <text class="txt small blue" x="332.5" y="229">图编码器</text>

  <rect class="input" x="60" y="305" width="150" height="48" rx="5"/>
  <text class="txt small" x="135" y="329">Manifest 特征</text>
  <rect class="enc" x="260" y="305" width="145" height="48" rx="5"/>
  <text class="txt small blue" x="332.5" y="329">Manifest 编码器</text>

  <path class="arrow" d="M210 129 H260"/>
  <path class="arrow" d="M210 229 H260"/>
  <path class="arrow" d="M210 329 H260"/>

  <!-- Branch prediction group -->
  <rect class="group" x="455" y="78" width="190" height="388" rx="10"/>
  <text class="txt tiny grayText" x="550" y="92">四个预测分支</text>

  <rect class="branch" x="485" y="105" width="130" height="48" rx="5"/>
  <text class="txt small brown" x="550" y="129">API 分支</text>
  <rect class="branch" x="485" y="205" width="130" height="48" rx="5"/>
  <text class="txt small brown" x="550" y="229">调用图分支</text>
  <rect class="branch" x="485" y="305" width="130" height="48" rx="5"/>
  <text class="txt small brown" x="550" y="329">Manifest 分支</text>

  <rect class="enc" x="260" y="430" width="145" height="48" rx="5"/>
  <text class="txt small blue" x="332.5" y="454">表示拼接</text>
  <rect class="branch" x="485" y="430" width="130" height="48" rx="5"/>
  <text class="txt small brown" x="550" y="454">综合分支</text>

  <path class="arrow" d="M405 129 H485"/>
  <path class="arrow" d="M405 229 H485"/>
  <path class="arrow" d="M405 329 H485"/>

  <!-- Clean representation-to-joint flow: a single arrow from encoders group to concat -->
  <rect class="group" x="245" y="82" width="175" height="292" rx="10"/>
  <text class="txt tiny grayText" x="332.5" y="388">三模态表示</text>
  <path class="arrow" d="M332.5 374 V430"/>
  <path class="arrow" d="M405 454 H485"/>

  <!-- Fusion evidence and gate -->
  <rect class="gate" x="115" y="555" width="260" height="58" rx="6"/>
  <text class="txt small green" x="245" y="576">融合证据</text>
  <text class="txt tiny green" x="245" y="598">可靠性、一致性、置信度、可用状态</text>

  <rect class="gate" x="540" y="555" width="170" height="58" rx="6"/>
  <text class="txt small green" x="625" y="576">门控网络</text>
  <text class="txt tiny green" x="625" y="598">生成四分支权重</text>

  <!-- Weighted fusion and output -->
  <rect class="gate" x="760" y="240" width="160" height="80" rx="7"/>
  <text class="txt small green" x="840" y="262">加权融合</text>
  <text class="txt tiny green" x="840" y="286">分支预测结果</text>
  <text class="txt tiny green" x="840" y="306">× 四分支权重</text>

  <rect class="out" x="980" y="256" width="130" height="48" rx="5"/>
  <text class="txt small" x="1045" y="280">最终预测</text>

  <!-- Only meaningful arrows -->
  <path class="arrow" d="M645 272 H760"/>
  <path class="arrow" d="M920 280 H980"/>
  <path class="arrow" d="M375 584 H540"/>
  <path class="arrow" d="M710 584 H840 V320"/>

  <!-- Legend note -->
  <text class="txt tiny grayText" x="720" y="372">实线箭头表示信息流</text>
</svg>
