<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#222"/>
    </marker>
    <style>
      .page{fill:#fff}
      .outer{fill:none;stroke:#222;stroke-width:1.5;stroke-dasharray:7 5}
      .box{fill:#fff;stroke:#222;stroke-width:1.6}
      .tag{fill:#eaf3ff;stroke:#5d86bd;stroke-width:1.5}
      .metric{fill:#fff9e8;stroke:#c6a24d;stroke-width:1.5}
      .out{fill:#f1faf2;stroke:#6d9c74;stroke-width:1.5}
      .arrow{stroke:#222;stroke-width:1.7;fill:none;marker-end:url(#arrow)}
      .plain{stroke:#222;stroke-width:1.5;fill:none}
      .txt{font-family:"SimSun","Songti SC","Microsoft YaHei",Arial,sans-serif;fill:#333;font-size:18px;text-anchor:middle;dominant-baseline:middle}
      .small{font-size:15.5px}
      .tiny{font-size:14px}
      .title{font-size:21px;font-weight:600}
      .blue{fill:#315f95}
      .yellow{fill:#735815}
      .green{fill:#35683b}
    </style>
  </defs>

  <rect class="page" width="1080" height="700"/>
  <text class="txt title" x="540" y="34">三模态可靠性建模总体框架</text>

  <rect class="box" x="430" y="64" width="220" height="48"/>
  <text class="txt" x="540" y="88">Android APK 样本</text>

  <rect class="outer" x="58" y="150" width="964" height="420" rx="28"/>
  <line class="arrow" x1="540" y1="112" x2="540" y2="150"/>

  <!-- extraction row -->
  <rect class="tag" x="122" y="200" width="250" height="54"/>
  <text class="txt blue" x="247" y="227">DEX 字节码静态分析</text>

  <rect class="tag" x="708" y="200" width="250" height="54"/>
  <text class="txt blue" x="833" y="227">Manifest 文件解析</text>

  <line class="plain" x1="540" y1="150" x2="540" y2="178"/>
  <line class="plain" x1="247" y1="178" x2="833" y2="178"/>
  <line class="arrow" x1="247" y1="178" x2="247" y2="200"/>
  <line class="arrow" x1="833" y1="178" x2="833" y2="200"/>

  <!-- modality row -->
  <rect class="box" x="90" y="330" width="230" height="80" rx="12"/>
  <text class="txt" x="205" y="354">API 调用序列</text>
  <text class="txt small" x="205" y="380">代码行为模态</text>
  <text class="txt tiny" x="205" y="400">序列长度、敏感调用、类别统计</text>

  <rect class="box" x="425" y="330" width="230" height="80" rx="12"/>
  <text class="txt" x="540" y="354">调用图</text>
  <text class="txt small" x="540" y="380">结构化调用上下文模态</text>
  <text class="txt tiny" x="540" y="400">节点、边、敏感节点、图结构</text>

  <rect class="box" x="760" y="330" width="230" height="80" rx="12"/>
  <text class="txt" x="875" y="354">Manifest 声明信息</text>
  <text class="txt small" x="875" y="380">异源声明模态</text>
  <text class="txt tiny" x="875" y="400">权限、组件、意图过滤器、统计特征</text>

  <line class="plain" x1="247" y1="254" x2="247" y2="292"/>
  <line class="plain" x1="205" y1="292" x2="540" y2="292"/>
  <line class="arrow" x1="205" y1="292" x2="205" y2="330"/>
  <line class="arrow" x1="540" y1="292" x2="540" y2="330"/>
  <line class="arrow" x1="833" y1="254" x2="875" y2="330"/>

  <!-- metric row -->
  <rect class="metric" x="90" y="486" width="230" height="64" rx="10"/>
  <text class="txt yellow" x="205" y="510">API 可靠性指标</text>
  <text class="txt small yellow" x="205" y="536">质量、退化强度、可用状态</text>

  <rect class="metric" x="425" y="486" width="230" height="64" rx="10"/>
  <text class="txt yellow" x="540" y="510">Graph 可靠性指标</text>
  <text class="txt small yellow" x="540" y="536">质量、退化强度、可用状态</text>

  <rect class="metric" x="760" y="486" width="230" height="64" rx="10"/>
  <text class="txt yellow" x="875" y="510">Manifest 可靠性指标</text>
  <text class="txt small yellow" x="875" y="536">质量、退化强度、可用状态</text>

  <line class="arrow" x1="205" y1="410" x2="205" y2="486"/>
  <line class="arrow" x1="540" y1="410" x2="540" y2="486"/>
  <line class="arrow" x1="875" y1="410" x2="875" y2="486"/>

  <!-- output -->
  <rect class="out" x="340" y="616" width="400" height="54" rx="8"/>
  <text class="txt green" x="540" y="640">样本级可靠性证据</text>
  <text class="txt tiny green" x="540" y="661">用于跨源一致性学习与自适应融合</text>

  <line class="arrow" x1="205" y1="550" x2="420" y2="616"/>
  <line class="arrow" x1="540" y1="550" x2="540" y2="616"/>
  <line class="arrow" x1="875" y1="550" x2="660" y2="616"/>
</svg>
