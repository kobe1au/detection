<svg xmlns="http://www.w3.org/2000/svg" width="980" height="780" viewBox="0 0 980 780">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222222"/>
    </marker>
    <style>
      .page {
        fill: #ffffff;
      }
      .chapter {
        fill: #ffffff;
        stroke: #222222;
        stroke-width: 1.8;
      }
      .method {
        fill: #ffffff;
        stroke: #222222;
        stroke-width: 1.8;
      }
      .tag {
        fill: #dcecff;
        stroke: #6f9bd2;
        stroke-width: 1.5;
      }
      .group {
        fill: none;
        stroke: #222222;
        stroke-width: 1.6;
        stroke-dasharray: 6 5;
      }
      .arrow {
        stroke: #222222;
        stroke-width: 1.8;
        fill: none;
        marker-end: url(#arrow);
      }
      .text {
        font-family: "SimSun", "Songti SC", "Microsoft YaHei", Arial, sans-serif;
        fill: #333333;
        font-size: 18px;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .small {
        font-size: 17px;
      }
      .tag-text {
        font-family: "SimSun", "Songti SC", "Microsoft YaHei", Arial, sans-serif;
        fill: #345d8f;
        font-size: 18px;
        text-anchor: middle;
        dominant-baseline: middle;
      }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="980" height="780"/>

  <!-- Top chapters -->
  <rect class="chapter" x="370" y="34" width="240" height="64"/>
